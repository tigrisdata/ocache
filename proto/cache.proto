syntax = "proto3";

package cache;

option go_package = "github.com/tigrisdata/ocache/proto;proto";

import "google/api/annotations.proto";
import "coordinator/proto/cluster.proto";

service CacheService {
  rpc Put (stream PutRequest) returns (PutResponse);
  rpc PutObject (PutRequest) returns (PutResponse) {
    option (google.api.http) = {
      post: "/v1/cache/{key}"
      body: "*"
    };
  }
  rpc Get (GetRequest) returns (stream GetResponse) {
    option (google.api.http) = {
      get: "/v1/cache/{key}"
    };
  }
  rpc Delete (DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = {
      delete: "/v1/cache/{key}"
    };
  }
  rpc List (ListRequest) returns (ListResponse) {
    option (google.api.http) = {
      get: "/v1/cache"
    };
  }
  // ListLocal is an internal RPC for cluster mode: queries local node only
  // Returns sorted, paginated keys from this node's storage
  rpc ListLocal (ListRequest) returns (ListResponse);

  rpc GetTopology (GetTopologyRequest) returns (GetTopologyResponse) {
    option (google.api.http) = {
      get: "/v1/topology"
    };
  }
}

message PutRequest {
  string key = 1; // the cache key; only required in the first message
  int64 ttl_seconds = 2; // optional TTL; only used in the first message
  bytes data = 3; // raw chunk of the object
}

message PutResponse {
  bool success = 1;
  string error  = 2; // nonempty if something went wrong
}

message GetRequest {
  string key = 1;
  int64 start = 2; // inclusive byte offset in the object (0-based)
  int64 end = 3;   // inclusive byte offset (if <0 or omitted, read to EOF)
}

message GetResponse {
  bytes data = 1;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool success = 1;
  string error  = 2;
}

message ListRequest {
  string prefix = 1; // Optional prefix to filter keys
  string start_key = 2; // Start listing after this key (exclusive), for pagination
  int32 limit = 3; // Maximum number of keys to return (default 1000, max 1000)
  string continuation_token = 4; // Opaque token for resuming pagination
}

message ListResponse {
  repeated string keys = 1;
  string continuation_token = 2; // Token to resume listing from where this response ended
  bool has_more = 3; // True if more keys are available beyond this page
}

message GetTopologyRequest {
  // Empty request for now; might be extended in future
}

message GetTopologyResponse {
  ClusterTopology topology = 1;  // Reuse ClusterTopology from cluster.proto
  string error = 2;  // non-empty if error occurred (e.g., cluster mode not enabled)
}
