syntax = "proto3";

package cache;

option go_package = "github.com/tigrisdata/ocache/proto;proto";

import "google/api/annotations.proto";

service CacheService {
  rpc Put (stream PutRequest) returns (PutResponse);
  rpc PutObject (PutRequest) returns (PutResponse) {
    option (google.api.http) = {
      post: "/v1/cache/{key}"
      body: "*"
    };
  }
  rpc Get (GetRequest) returns (stream GetResponse) {
    option (google.api.http) = {
      get: "/v1/cache/{key}"
    };
  }
  rpc Delete (DeleteRequest) returns (DeleteResponse) {
    option (google.api.http) = {
      delete: "/v1/cache/{key}"
    };
  }
  rpc List (ListRequest) returns (stream ListResponse) {
    option (google.api.http) = {
      get: "/v1/cache"
    };
  }
}

message PutRequest {
  string key = 1; // the cache key; only required in the first message
  int64 ttl_seconds = 2; // optional TTL; only used in the first message
  bytes data = 3; // raw chunk of the object
}

message PutResponse {
  bool success = 1;
  string error  = 2; // nonempty if something went wrong
}

message GetRequest {
  string key = 1;
  int64 start = 2; // inclusive byte offset in the object (0-based)
  int64 end = 3;   // exclusive byte offset (if 0 or omitted, read to EOF)
}

message GetResponse {
  bytes data = 1;
}

message DeleteRequest {
  string key = 1;
}

message DeleteResponse {
  bool success = 1;
  string error  = 2;
}

message ListRequest {}

message ListResponse {
  repeated string keys = 1;
}

// ValueType indicates where the value bytes are stored.
enum ValueType {
  INLINE = 0;     // Value is stored directly in the `data` field.
  RAW_FILE = 1;   // Value is stored in an external raw file referenced by `raw_file_path`.
  SEGMENT = 2;    // Value is stored inside a segment file referenced by `segment_path`.
}

// ValueMessage is a proto-encoded value for storage
message ValueMessage {
  ValueType value_type = 1; // Location of the value bytes
  bytes data = 2; // The actual value bytes
  int64 expiry = 3; // Expiry timestamp (unix seconds), 0 if no expiry
  string raw_file_path = 4; // Optional: raw file path for large objects (if used)
  string segment_path = 5; // Optional: segment file storing the value for large objects (if used)
  int64 segment_offset = 6; // Byte offset within the segment where the value starts
  int64 value_length = 7; // Length of the value in bytes within the segment
  uint32 checksum = 8; // CRC32 checksum of the value
}
