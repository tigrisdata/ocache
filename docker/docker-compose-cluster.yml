x-ocache-common: &ocache-common
  image: tigrisdata/ocache:latest
  restart: unless-stopped

services:
  ocache-node1:
    <<: *ocache-common
    container_name: ocache-node1
    hostname: ocache-node1
    ports:
      - "9001:9000"
      - "9101:9001"
      - "7001:7000"
    volumes:
      - ocache-node1-data:/data
    command:
      - "-disk=/data"
      - "-listen-addr=:9000"
      - "-listen-http=:9001"
      - "-cluster-enabled"
      - "-node-id=node1"
      - "-cluster-addr=:7000"
      - "-seeds=ocache-node1:7000,ocache-node2:7000,ocache-node3:7000"
      - "-ttl=${OCACHE_TTL:-0}"
      - "-max-disk-usage=${OCACHE_MAX_DISK_USAGE:-0}"
      - "-request-logging=${OCACHE_REQUEST_LOGGING:-false}"
    networks:
      - ocache-cluster

  ocache-node2:
    <<: *ocache-common
    container_name: ocache-node2
    hostname: ocache-node2
    ports:
      - "9002:9000"
      - "9102:9001"
      - "7002:7000"
    volumes:
      - ocache-node2-data:/data
    command:
      - "-disk=/data"
      - "-listen-addr=:9000"
      - "-listen-http=:9001"
      - "-cluster-enabled"
      - "-node-id=node2"
      - "-cluster-addr=:7000"
      - "-seeds=ocache-node1:7000,ocache-node2:7000,ocache-node3:7000"
      - "-ttl=${OCACHE_TTL:-0}"
      - "-max-disk-usage=${OCACHE_MAX_DISK_USAGE:-0}"
      - "-request-logging=${OCACHE_REQUEST_LOGGING:-false}"
    depends_on:
      - ocache-node1
    networks:
      - ocache-cluster

  ocache-node3:
    <<: *ocache-common
    container_name: ocache-node3
    hostname: ocache-node3
    ports:
      - "9003:9000"
      - "9103:9001"
      - "7003:7000"
    volumes:
      - ocache-node3-data:/data
    command:
      - "-disk=/data"
      - "-listen-addr=:9000"
      - "-listen-http=:9001"
      - "-cluster-enabled"
      - "-node-id=node3"
      - "-cluster-addr=:7000"
      - "-seeds=ocache-node1:7000,ocache-node2:7000,ocache-node3:7000"
      - "-ttl=${OCACHE_TTL:-0}"
      - "-max-disk-usage=${OCACHE_MAX_DISK_USAGE:-0}"
      - "-request-logging=${OCACHE_REQUEST_LOGGING:-false}"
    depends_on:
      - ocache-node2
    networks:
      - ocache-cluster

networks:
  ocache-cluster:

volumes:
  ocache-node1-data:
  ocache-node2-data:
  ocache-node3-data:
