syntax = "proto3";

package cache;

option go_package = "github.com/tigrisdata/ocache/coordinator/proto;proto";

// ClusterService handles cluster communication.
// Membership is handled via memberlist gossip - only topology queries are exposed.
service ClusterService {
  // GetClusterState returns the current cluster membership
  rpc GetClusterState(Empty) returns (ClusterState);
  // GetClusterTopology returns full cluster topology including ring configuration
  rpc GetClusterTopology(Empty) returns (ClusterTopology);
}

// Node status enum
enum NodeStatus {
  NODE_STATUS_ACTIVE = 0;
  NODE_STATUS_JOINING = 1;
  NODE_STATUS_LEAVING = 2;
  NODE_STATUS_DOWN = 3;
}

// Empty message for requests with no parameters
message Empty {}

// Node information
message NodeInfo {
  string id = 1;
  string address = 2;           // Cluster communication address (for gossip)
  NodeStatus status = 3;
  uint64 joined_at = 4;
  double weight = 5;
  string listen_address = 6;    // Service listen address for client requests (Put/Get/Delete)
}

// Cluster state
message ClusterState {
  uint64 epoch = 1;
  repeated NodeInfo nodes = 2;
}

// Token assignments per node for consistent hashing
message NodeTokens {
  string node_id = 1;
  repeated uint32 tokens = 2;  // Sorted list of tokens owned by this node
}

// Ring configuration for clients to replicate hashing
message RingConfig {
  int32 replication_factor = 1;        // Data replication factor (1 = no replication)
  repeated NodeTokens node_tokens = 2; // Token assignments per node
}

// Cluster topology with token-based ring configuration
message ClusterTopology {
  uint64 epoch = 1;
  repeated NodeInfo nodes = 2;
  RingConfig ring_config = 3;
}
