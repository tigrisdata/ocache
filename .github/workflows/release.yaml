name: release
on:
  push:
    branches:
      - "release"

env:
  GO_VERSION: "1.24.2"
  ROCKSDB_VERSION: "10.4.2"
  GOWORK: ${{ github.workspace }}/go.work
  GOPRIVATE: github.com/tigrisdata/ocache/*

jobs:
  test:
    uses: ./.github/workflows/test.yml
    permissions:
      actions: write
      contents: read
      packages: write

  build-binaries:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: namespace-profile-ubuntu-2404
            arch: x86_64
            goos: linux
            goarch: amd64
          - os: namespace-profile-ubuntu-2404-arm
            arch: aarch64
            goos: linux
            goarch: arm64
          - os: namespace-profile-macos-1561-arm
            arch: arm64
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure git for private modules
        run: |
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.work.sum

      - name: Set OS name
        id: os-name
        run: |
          OS_NAME=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          echo "os_name=${OS_NAME}" >> $GITHUB_OUTPUT

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgflags-dev \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev libbz2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake snappy lz4 zstd

      - name: Cache RocksDB static artifact
        uses: actions/cache@v4
        id: cache-rocksdb-static
        with:
          path: rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ steps.os-name.outputs.os_name }}-${{ matrix.arch }}.tar.gz
          key: ${{ runner.os }}-rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ matrix.arch }}-v5

      - name: Download pre-built RocksDB artifact
        if: steps.cache-rocksdb-static.outputs.cache-hit != 'true'
        run: |
          # Try to download from GitHub releases first
          ARTIFACT_NAME="rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ steps.os-name.outputs.os_name }}-${{ matrix.arch }}.tar.gz"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/rocksdb-v${{ env.ROCKSDB_VERSION }}/${ARTIFACT_NAME}"

          if curl -fsSL -o "${ARTIFACT_NAME}" "${RELEASE_URL}"; then
            echo "Downloaded pre-built artifact from release"
          else
            echo "Pre-built artifact not found, building from source..."
            ROCKSDB_VERSION=${{ env.ROCKSDB_VERSION }} \
            OS=${{ steps.os-name.outputs.os_name }} \
            ARCH=${{ matrix.arch }} \
            make build-rocksdb-static
            mv rocksdb-static/rocksdb-static-*.tar.gz .
          fi

      - name: Extract RocksDB static artifact
        run: |
          mkdir -p rocksdb-static/artifact
          tar xzf rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ steps.os-name.outputs.os_name }}-${{ matrix.arch }}.tar.gz -C rocksdb-static/artifact
          ls -la rocksdb-static/artifact/

      - name: Install dependencies
        run: make install-deps

      - name: Generate proto files
        run: make proto

      - name: Build binaries
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} STATIC_BUILD=true make all

      - name: Rename binaries with platform suffix
        run: |
          mkdir -p dist
          mv ocache dist/ocache-${{ matrix.goos }}-${{ matrix.goarch }}
          mv ocachecli dist/ocachecli-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_BOT_ACCESS_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Needed by the "Create per-module Go tags" step to rewrite intra-module
      # require directives with `go mod edit`.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Get tags before release
        id: before-release
        run: |
          # Fetch existing tags since actions/checkout does a shallow clone
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Tag before semantic-release: ${LATEST_TAG:-none}"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_BOT_ACCESS_TOKEN }}
        run: npx semantic-release --debug

      - name: Get new release tag
        id: get-release
        run: |
          # Fetch any new tags created by semantic-release
          git fetch --tags
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          BEFORE_TAG="${{ steps.before-release.outputs.tag }}"

          if [ -n "$NEW_TAG" ] && [ "$NEW_TAG" != "$BEFORE_TAG" ]; then
            echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "New release created: $NEW_TAG"
          else
            echo "No new release created (tag unchanged: ${BEFORE_TAG:-none})"
          fi

      - name: Upload binaries to release
        if: steps.get-release.outputs.tag != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GH_BOT_ACCESS_TOKEN }}
        run: |
          TAG="${{ steps.get-release.outputs.tag }}"
          for binary in artifacts/*; do
            echo "Uploading $(basename $binary) to $TAG..."
            gh release upload "$TAG" "$binary"
          done

      - name: Create per-module Go tags
        if: steps.get-release.outputs.tag != ''
        run: |
          TAG="${{ steps.get-release.outputs.tag }}"
          echo "Creating per-module tags for Go module consumption..."

          # Configure git for tagging
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Module tagging order (dependencies first):
          # 1. Leaf modules (no internal dependencies)
          # 2. Modules that depend on leaves
          # 3. Client and server modules
          # 4. Embedded module (depends on client and server)
          MODULES=(
            "common"
            "coordinator/proto"
            "proto"
            "coordinator"
            "storage"
            "client"
            "server"
            "embedded"
          )

          # Pin intra-repo sibling require directives to the release version.
          # The committed go.mod files keep their go.work-era requires (e.g.
          # v1.1.0) because they resolve to local code via go.work during dev, and
          # nothing updates them at release time. Without this, a consumer that
          # bumps one module (say embedded) does NOT transitively get the matching
          # sibling versions -- MVS leaves coordinator/server/common at whatever it
          # already had, silently omitting fixes and sometimes failing to compile
          # (issue #171). Rewrite each module's ocache-sibling requires to ${TAG}
          # so a single `go get <module>@${TAG}` resolves the whole set.
          echo "Pinning intra-module require directives to ${TAG}..."
          for module in "${MODULES[@]}"; do
            pushd "$module" >/dev/null
            for sib in "${MODULES[@]}"; do
              [ "$sib" = "$module" ] && continue
              modpath="github.com/tigrisdata/ocache/${sib}"
              # Only rewrite a require that already exists (exact-path match, so
              # "coordinator" is not confused with "coordinator/proto").
              if GOWORK=off go mod edit -json | jq -e --arg p "$modpath" '.Require[]? | select(.Path == $p)' >/dev/null; then
                GOWORK=off go mod edit -require "${modpath}@${TAG}"
                echo "  ${module}: require ${modpath}@${TAG}"
              fi
            done
            popd >/dev/null
          done

          # Commit the rewritten go.mod files. This commit is referenced only by
          # the per-module tags below (we push tags, not the branch), so the tags
          # point at a self-consistent tree without moving the release branch.
          # [skip ci] keeps this commit from re-triggering the release workflow.
          if ! git diff --quiet; then
            git commit -am "chore(release): pin intra-module requires to ${TAG} [skip ci]"
          else
            echo "No require rewrites were needed."
          fi

          for module in "${MODULES[@]}"; do
            MODULE_TAG="${module}/${TAG}"
            echo "Creating tag: $MODULE_TAG"
            git tag "$MODULE_TAG" || { echo "Error: Tag $MODULE_TAG already exists"; exit 1; }
          done

          echo "Pushing per-module tags..."
          git push origin --tags
