name: Build ARM64 (QEMU)

on:
  workflow_call:
    inputs:
      build_type:
        description: 'Type of build: release or rocksdb'
        required: true
        type: string
      rocksdb_version:
        description: 'RocksDB version'
        required: false
        type: string
        default: '10.4.2'
      go_version:
        description: 'Go version'
        required: false
        type: string
        default: '1.24.2'

env:
  GO_VERSION: ${{ inputs.go_version || '1.24.2' }}
  ROCKSDB_VERSION: ${{ inputs.rocksdb_version || '10.4.2' }}

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build release binaries (ARM64)
        if: inputs.build_type == 'release'
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -e GO_VERSION=${{ env.GO_VERSION }} \
            -e ROCKSDB_VERSION=${{ env.ROCKSDB_VERSION }} \
            -e GITHUB_REPOSITORY=${{ github.repository }} \
            -w /workspace \
            arm64v8/ubuntu:24.04 \
            bash /workspace/scripts/build-arm64-release.sh

      - name: Build RocksDB (ARM64)
        if: inputs.build_type == 'rocksdb'
        run: |
          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            -e ROCKSDB_VERSION=${{ env.ROCKSDB_VERSION }} \
            -w /workspace \
            arm64v8/ubuntu:24.04 \
            bash /workspace/scripts/build-arm64-rocksdb.sh

      - name: Upload release artifacts
        if: inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux-arm64
          path: dist/
          retention-days: 1

      - name: Upload RocksDB artifact
        if: inputs.build_type == 'rocksdb'
        uses: actions/upload-artifact@v4
        with:
          name: rocksdb-static-${{ env.ROCKSDB_VERSION }}-Linux-aarch64
          path: rocksdb-static/rocksdb-static-*.tar.gz
          retention-days: 90
