name: Docker Build and Push

on:
  workflow_run:
    workflows: ["release"]
    types: [completed]
    branches: [release]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g., v1.0.0)"
        required: true

jobs:
  build-and-push:
    runs-on: namespace-profile-ubuntu-2404
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            git fetch --tags
            VERSION=$(git describe --tags --abbrev=0)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GH_BOT_ACCESS_TOKEN }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          mkdir -p docker/bin/amd64 docker/bin/arm64

          # Download amd64 binaries
          gh release download "$VERSION" -p "ocache-linux-amd64" -O docker/bin/amd64/ocache
          gh release download "$VERSION" -p "ocachecli-linux-amd64" -O docker/bin/amd64/ocachecli

          # Download arm64 binaries
          gh release download "$VERSION" -p "ocache-linux-arm64" -O docker/bin/arm64/ocache
          gh release download "$VERSION" -p "ocachecli-linux-arm64" -O docker/bin/arm64/ocachecli

          chmod +x docker/bin/*/ocache docker/bin/*/ocachecli

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.GH_DOCKER_ACCESS_USER }}
          password: ${{ secrets.GH_DOCKER_ACCESS_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TAGS="tigrisdata/ocache:${VERSION}"
          # Only add 'latest' tag when triggered by release workflow, not manual dispatch
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAGS="${TAGS},tigrisdata/ocache:latest"
          fi
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v5
        with:
          context: docker
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
