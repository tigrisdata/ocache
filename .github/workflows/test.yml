name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.21"
  ROCKSDB_VERSION: "10.4.2"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            arch: x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgflags-dev \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev libbz2-dev

      - name: Cache RocksDB static artifact
        uses: actions/cache@v4
        id: cache-rocksdb-static
        with:
          path: rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ runner.os }}-${{ matrix.arch }}.tar.gz
          key: ${{ runner.os }}-rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ matrix.arch }}-v4

      - name: Download pre-built RocksDB artifact
        if: steps.cache-rocksdb-static.outputs.cache-hit != 'true'
        run: |
          # Try to download from GitHub releases first
          ARTIFACT_NAME="rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ runner.os }}-${{ matrix.arch }}.tar.gz"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/rocksdb-v${{ env.ROCKSDB_VERSION }}/${ARTIFACT_NAME}"
          
          if curl -fsSL -o "${ARTIFACT_NAME}" "${RELEASE_URL}"; then
            echo "Downloaded pre-built artifact from release"
          else
            echo "Pre-built artifact not found, building from source..."
            ROCKSDB_VERSION=${{ env.ROCKSDB_VERSION }} make build-rocksdb-static
            mv rocksdb-static/rocksdb-static-*.tar.gz .
          fi

      - name: Extract RocksDB static artifact
        run: |
          mkdir -p rocksdb-static/artifact
          tar xzf rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ runner.os }}-${{ matrix.arch }}.tar.gz -C rocksdb-static/artifact
          ls -la rocksdb-static/artifact/

      - name: Install dependencies
        run: make install-deps

      - name: Generate proto files
        run: make proto

      - name: Build
        run: STATIC_BUILD=true make all

      - name: Run linting
        run: STATIC_BUILD=true make lint

      - name: Run tests with race detector
        run: STATIC_BUILD=true make test-race

      - name: Run coverage tests
        run: STATIC_BUILD=true make test-coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: |
            coverage.out
            coverage.html

      - name: Run end-to-end tests
        run: STATIC_BUILD=true make test-e2e
