name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.21"
  ROCKSDB_VERSION: "10.4.2"

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]
        include:
          - os: ubuntu-latest
            arch: x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgflags-dev \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev libbz2-dev

      - name: Cache RocksDB build
        uses: actions/cache@v4
        id: cache-rocksdb
        with:
          path: |
            /usr/local/lib/librocksdb*
            /usr/local/include/rocksdb
            /usr/local/lib/pkgconfig/rocksdb.pc
            /usr/local/lib/cmake/rocksdb
          key: ${{ runner.os }}-rocksdb-${{ env.ROCKSDB_VERSION }}-${{ matrix.arch }}-v2

      - name: Install RocksDB from source
        if: steps.cache-rocksdb.outputs.cache-hit != 'true'
        run: ROCKSDB_VERSION=${{ env.ROCKSDB_VERSION }} make install-rocksdb-from-source

      - name: Verify RocksDB installation
        run: |
          ls -la /usr/local/include/rocksdb/c.h || echo "RocksDB header not found"
          ls -la /usr/local/lib/librocksdb* || echo "RocksDB library not found"

      - name: Install dependencies
        run: make install-deps

      - name: Generate proto files
        run: make proto

      - name: Build
        run: make all

      - name: Run linting
        run: make lint

      - name: Run tests with race detector
        run: make test-race

      - name: Run coverage tests
        run: make test-coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: |
            coverage.out
            coverage.html

      - name: Run end-to-end tests
        run: make test-e2e
