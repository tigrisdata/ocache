name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"

env:
  GO_VERSION: "1.21"
  ROCKSDB_VERSION: "10.4.2"

jobs:
  build:
    strategy:
      matrix:
        os: [namespace-profile-ubuntu-2404]
        include:
          - os: namespace-profile-ubuntu-2404
            arch: x86_64
    runs-on: ${{ matrix.os }}

    permissions:
      actions: write
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgflags-dev \
            libsnappy-dev liblz4-dev libzstd-dev zlib1g-dev libbz2-dev

      - name: Set OS name
        id: os-name
        run: |
          OS_NAME=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
          echo "os_name=${OS_NAME}" >> $GITHUB_OUTPUT

      - name: Cache RocksDB static artifact
        uses: actions/cache@v4
        id: cache-rocksdb-static
        with:
          path: rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ steps.os-name.outputs.os_name }}-${{ matrix.arch }}.tar.gz
          key: ${{ runner.os }}-rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ matrix.arch }}-v5

      - name: Download pre-built RocksDB artifact
        if: steps.cache-rocksdb-static.outputs.cache-hit != 'true'
        run: |
          # Try to download from GitHub releases first
          ARTIFACT_NAME="rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ steps.os-name.outputs.os_name }}-${{ matrix.arch }}.tar.gz"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/download/rocksdb-v${{ env.ROCKSDB_VERSION }}/${ARTIFACT_NAME}"

          if curl -fsSL -o "${ARTIFACT_NAME}" "${RELEASE_URL}"; then
            echo "Downloaded pre-built artifact from release"
          else
            echo "Pre-built artifact not found, building from source..."
            ROCKSDB_VERSION=${{ env.ROCKSDB_VERSION }} \
            OS=${{ steps.os-name.outputs.os_name }} \
            ARCH=${{ matrix.arch }} \
            make build-rocksdb-static
            mv rocksdb-static/rocksdb-static-*.tar.gz .
          fi

      - name: Extract RocksDB static artifact
        run: |
          mkdir -p rocksdb-static/artifact
          tar xzf rocksdb-static-${{ env.ROCKSDB_VERSION }}-${{ steps.os-name.outputs.os_name }}-${{ matrix.arch }}.tar.gz -C rocksdb-static/artifact
          ls -la rocksdb-static/artifact/

      - name: Install dependencies
        run: make install-deps

      - name: Generate proto files
        run: make proto

      - name: Build
        run: STATIC_BUILD=true make all

      - name: Run linting
        run: STATIC_BUILD=true make lint

      - name: Run tests with race detector
        run: STATIC_BUILD=true make test-race

      - name: Run coverage tests
        run: STATIC_BUILD=true make test-coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.os }}
          path: |
            coverage.out
            coverage.html

      - name: Run integration tests - Small, medium, and large objects
        run: STATIC_BUILD=true make test-integration-objects

      - name: Run integration tests - Compaction
        run: STATIC_BUILD=true make test-integration-compaction

      - name: Run integration tests - Cleaner
        run: STATIC_BUILD=true make test-integration-cleaner

      - name: Run integration tests - Workflow
        run: STATIC_BUILD=true make test-integration-workflow

      - name: Run integration tests - Coordinator
        run: STATIC_BUILD=true make test-integration-coordinator

      - name: Run concurrent operations E2E test
        run: STATIC_BUILD=true make test-e2e-concurrent

      - name: Run storage layers E2E test
        run: STATIC_BUILD=true make test-e2e-storage-layers

      - name: Run TTL functionality E2E test
        run: STATIC_BUILD=true make test-e2e-ttl

      - name: Run LRU eviction E2E test
        run: STATIC_BUILD=true make test-e2e-lru

      - name: Run compaction E2E test
        run: STATIC_BUILD=true make test-e2e-compaction

      - name: Run recompaction E2E test
        run: STATIC_BUILD=true make test-e2e-recompaction
